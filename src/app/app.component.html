<div class="container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Formulário de Teste</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">
        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Nome</mat-label>
            <input matInput formControlName="name" placeholder="Digite seu nome">
            <mat-error *ngIf="registrationForm.get('name')?.errors?.['required'] && registrationForm.get('name')?.touched">
              Nome é obrigatório
            </mat-error>
          </mat-form-field>
        </div>

        <div class="form-row">
          <app-datetime-picker 
            label="Data/hora da Inscrição"
            formControlName="registrationDate" 
            placeholder="DD/MM/AAAA HH:MM"
            [required]="true">
          </app-datetime-picker>
        </div>

        <div class="form-actions">
          <button mat-raised-button color="primary" type="submit">Enviar</button>
          <button mat-button type="button" (click)="registrationForm.reset()">Limpar</button>
        </div>
      </form>
      
      <!-- JSON representation of form data -->
      <div class="json-data-container" *ngIf="showFormData">
        <h3>Dados do Formulário (JSON):</h3>
        <pre>{{ formDataJson }}</pre>
      </div>
    </mat-card-content>
  </mat-card>
</div>
