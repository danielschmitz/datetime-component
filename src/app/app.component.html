<div class="container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Formulário de Registro</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">
        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Nome</mat-label>
            <input matInput formControlName="name" placeholder="Digite seu nome">
            <mat-error *ngIf="registrationForm.get('name')?.errors?.['required'] && registrationForm.get('name')?.touched">
              Nome é obrigatório
            </mat-error>
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Data da Inscrição</mat-label>
            <input matInput [matDatepicker]="picker" formControlName="registrationDate" placeholder="DD/MM/AAAA">
            <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
            <mat-error *ngIf="registrationForm.get('registrationDate')?.errors?.['required'] && registrationForm.get('registrationDate')?.touched">
              Data da inscrição é obrigatória
            </mat-error>
          </mat-form-field>
        </div>

        <div class="form-actions">
          <button mat-raised-button color="primary" type="submit">Enviar</button>
          <button mat-button type="button" (click)="registrationForm.reset()">Limpar</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
